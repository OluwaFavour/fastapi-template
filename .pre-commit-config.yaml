repos:
  - repo: https://github.com/psf/black
    rev: "24.10.0"
    hooks:
      - id: black

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.8.0"
    hooks:
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      - id: lint-imports
        name: lint-imports
        entry: lint-imports
        language: system
        pass_filenames: false
        always_run: true
